appId: com.mclauncher.app
productName: MCLauncher
copyright: MCLauncher — Unofficial Minecraft Launcher

directories:
  output: dist-electron
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!node_modules/**"

extraResources:
  - from: assets/
    to: assets/

win:
  target: nsis
  icon: assets/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: MCLauncher

linux:
  target:
    - AppImage
  icon: assets/icon.png

appImage:
  artifactName: MCLauncher-.AppImage

artifactName: MCLauncher---.